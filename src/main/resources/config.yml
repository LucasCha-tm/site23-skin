# Site23Skin – Configuration
# ===========================
settings:
  prefix: "&8[&cSite-23&8] &r"
  # true = le skin de grade persiste après reconnexion
  persistent: true
  # Délai en ticks avant d'appliquer le skin après connexion (20 ticks = 1s)
  apply-delay: 40

# Correspondance grade -> fichier PNG dans le dossier skins/
# Le fichier doit s'appeler exactement <grade>.png
# La tête du joueur original est TOUJOURS conservée (lignes 0-15 du PNG)
