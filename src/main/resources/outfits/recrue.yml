# Tenue du grade : Recrue (Sécurité)
# =====================================
# display-name : nom affiché dans les messages
# department   : département auquel appartient ce grade
#
# Pour chaque pièce d'équipement :
#   material  : nom du matériau Minecraft (https://hub.spigotmc.org/javadocs/bukkit/org/bukkit/Material.html)
#   color     : couleur en RGB pour les armures en cuir (R, G, B) — ignorer pour les autres armures
#   enchants  : liste des enchantements (nom:niveau)
#   unbreakable: true/false
#   hide-flags: true = masque les attributs/enchantements dans le tooltip
#   custom-model-data: entier pour les resource packs (laisser 0 si inutilisé)
#
# Slots disponibles : helmet, chestplate, leggings, boots, mainhand, offhand

display-name: "Recrue"
department: "securite"

helmet:
  material: LEATHER_HELMET
  color:
    r: 30
    g: 30
    b: 30
  unbreakable: true
  hide-flags: true
  custom-model-data: 0
  enchants: []

chestplate:
  material: LEATHER_CHESTPLATE
  color:
    r: 30
    g: 30
    b: 30
  unbreakable: true
  hide-flags: true
  custom-model-data: 0
  enchants: []

leggings:
  material: LEATHER_LEGGINGS
  color:
    r: 20
    g: 20
    b: 20
  unbreakable: true
  hide-flags: true
  custom-model-data: 0
  enchants: []

boots:
  material: LEATHER_BOOTS
  color:
    r: 20
    g: 20
    b: 20
  unbreakable: true
  hide-flags: true
  custom-model-data: 0
  enchants: []

mainhand:
  material: AIR
  custom-model-data: 0
  enchants: []

offhand:
  material: AIR
  custom-model-data: 0
  enchants: []
