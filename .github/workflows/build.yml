name: Build Site23Skin

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  # Permet de déclencher le build manuellement depuis l'onglet Actions
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # ── 1. Récupère le code ─────────────────────────────────────
      - name: Checkout code
        uses: actions/checkout@v4

      # ── 2. Configure Java 21 ────────────────────────────────────
      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      # ── 3. Télécharge le jar SkinsRestorer depuis GitHub ────────
      #    On télécharge le jar complet (qui contient l'API publique)
      #    et on l'installe dans le repo Maven local en tant qu'API.
      - name: Download SkinsRestorer jar
        run: |
          SR_VERSION="15.4.2"
          SR_JAR="SkinsRestorer.jar"

          echo "Téléchargement de SkinsRestorer v${SR_VERSION}..."

          # Télécharge depuis GitHub Releases (toujours accessible sur GH Actions)
          curl -L \
            "https://github.com/SkinsRestorer/SkinsRestorer/releases/download/${SR_VERSION}/SkinsRestorer.jar" \
            -o "${SR_JAR}"

          # Vérifie que le téléchargement a réussi
          if [ ! -f "${SR_JAR}" ] || [ ! -s "${SR_JAR}" ]; then
            echo "ERREUR : Téléchargement échoué !"
            exit 1
          fi

          echo "Téléchargement OK ($(du -sh ${SR_JAR} | cut -f1))"

          # Installe le jar dans le repo Maven local sous les coordonnées attendues
          mvn install:install-file \
            -Dfile="${SR_JAR}" \
            -DgroupId=net.skinsrestorer \
            -DartifactId=skinsrestorer-api \
            -Dversion="${SR_VERSION}" \
            -Dpackaging=jar \
            -DgeneratePom=true \
            --no-transfer-progress

          echo "SkinsRestorer installé dans le repo Maven local."

      # ── 4. Compile le plugin ────────────────────────────────────
      - name: Build with Maven
        run: |
          mvn clean package \
            --file pom.xml \
            --no-transfer-progress \
            -Dmaven.test.skip=true

      # ── 5. Vérifie que le jar a bien été produit ────────────────
      - name: Verify output jar
        run: |
          JAR=$(find target -name "Site23Skin-*.jar" ! -name "*-shaded.jar" | head -1)
          if [ -z "$JAR" ]; then
            # Prend le premier jar disponible si pas de jar non-shaded
            JAR=$(find target -name "*.jar" | head -1)
          fi
          if [ -z "$JAR" ]; then
            echo "ERREUR : Aucun jar trouvé dans target/ !"
            ls -la target/
            exit 1
          fi
          echo "Jar produit : $JAR ($(du -sh $JAR | cut -f1))"

      # ── 6. Upload le jar compilé comme artifact GitHub ──────────
      - name: Upload plugin jar
        uses: actions/upload-artifact@v4
        with:
          name: Site23Skin-${{ github.run_number }}
          # Prend tous les jars dans target/ (le shade en produit deux, on veut l'original)
          path: |
            target/Site23Skin-*.jar
            !target/original-*.jar
          retention-days: 30
          if-no-files-found: error
