name: Build Site23Skin

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Vérifier que libs/SkinsRestorer.jar est présent
        run: |
          if [ ! -f "libs/SkinsRestorer.jar" ]; then
            echo "ERREUR : libs/SkinsRestorer.jar est absent du repo !"
            echo "Télécharge SkinsRestorer.jar depuis :"
            echo "https://github.com/SkinsRestorer/SkinsRestorer/releases/tag/15.4.2"
            echo "et place-le dans le dossier libs/ de ton repo."
            exit 1
          fi
          echo "libs/SkinsRestorer.jar trouvé ($(du -sh libs/SkinsRestorer.jar | cut -f1))"

      - name: Build avec Maven
        run: mvn clean package --no-transfer-progress -Dmaven.test.skip=true

      - name: Upload plugin jar
        uses: actions/upload-artifact@v4
        with:
          name: Site23Skin-build-${{ github.run_number }}
          path: target/Site23Skin-*.jar
          retention-days: 30
          if-no-files-found: error
