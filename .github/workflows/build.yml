name: Build Site23Skin

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          # PAS de cache Maven — on veut un environnement propre à chaque fois

      # Installe le jar local libs/SkinsRestorer.jar dans le repo Maven local
      - name: Install SkinsRestorer from libs/
        run: |
          mvn install:install-file \
            -Dfile=libs/SkinsRestorer.jar \
            -DgroupId=net.skinsrestorer \
            -DartifactId=skinsrestorer-api \
            -Dversion=15.4.2 \
            -Dpackaging=jar \
            -DgeneratePom=true \
            --no-transfer-progress

      - name: Build with Maven
        run: |
          mvn clean package \
            --no-transfer-progress \
            -Dmaven.test.skip=true

      - name: Upload plugin jar
        uses: actions/upload-artifact@v4
        with:
          name: Site23Skin-build-${{ github.run_number }}
          path: target/Site23Skin-*.jar
          retention-days: 30
          if-no-files-found: error
